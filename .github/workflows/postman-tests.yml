name: Postman Integration Tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  integration-tests:
    name: Run Postman Tests
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11.3.2
        env:
          MYSQL_DATABASE: padelzgz
          MYSQL_USER: padeluser
          MYSQL_PASSWORD: padelpass
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (skip unit tests)
        run: mvn clean package -DskipTests

      - name: Start Spring Boot API
        run: |
          java -jar target/*.jar \
            --spring.profiles.active=dev \
            --spring.datasource.url=jdbc:mariadb://localhost:3306/padelzgz \
            --spring.datasource.username=padeluser \
            --spring.datasource.password=padelpass \
            --spring.datasource.driver-class-name=org.mariadb.jdbc.Driver \
            --jwt.secret=padelzgzSecretKeyMuyLargaParaQueSeaSegura2024XYZ123456789ABC \
            --jwt.expiration=86400000 &
          echo "API PID: $!"

      - name: Wait for API to be ready
        run: |
          echo "Waiting for API..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/clubs > /dev/null 2>&1; then
              echo "API is up after $((i*2)) seconds"
              break
            fi
            echo "Attempt $i/30 - not ready yet..."
            sleep 2
          done
          curl -sf http://localhost:8080/clubs || (echo "API did not start in time" && exit 1)

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Create results directory
        run: mkdir -p results

      - name: Run Postman collection
        run: |
          newman run postman/PadelZGZ_API_RUNNER.postman_collection.json \
            --env-var "baseUrl=http://localhost:8080" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export results/newman-report.html \
            --iteration-count 1 \
            --timeout-request 10000 \
            --delay-request 300

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-html-report
          path: results/newman-report.html
          retention-days: 7
