# =============================================
# CONFIGURACIÓN GENERAL
# =============================================
spring.application.name=padelzgz-api

# Perfil por defecto
spring.profiles.active=dev

# =============================================
# CONFIGURACIÓN JWT
# =============================================
jwt.secret=${JWT_SECRET:padelzgzSecretKeyMuyLargaParaQueSeaSegura2024XYZ123456789ABC}
jwt.expiration=${JWT_EXPIRATION:86400000}

# =============================================
# SPRINGDOC / SWAGGER
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html